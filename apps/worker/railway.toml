# Worker on Railway — the service Root Directory MUST be the monorepo root (".").
# If Root Directory is apps/worker, the Docker/Nixpacks context has no packages/db,
# so npm resolves @clipforge/db from npmjs and fails with 404.
#
# Recommended (this repo includes a root Dockerfile):
#   Root Directory:  (empty / repo root)
#   Builder:         Dockerfile
#   Dockerfile path: Dockerfile
#   Start command:   npm run start:worker
#
# Alternative (Nixpacks, same Root Directory = repo root):
#   Build:  npm ci && npm run build:worker
#
# typescript stays in package dependencies so production installs can still run tsc.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "npm run start:worker"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
